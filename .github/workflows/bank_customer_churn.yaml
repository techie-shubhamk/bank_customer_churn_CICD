name: CI-CD Pipeline (PyTorch ANN Churn)

on:
  push:
    branches: [ "main" ]

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Checkout repo
    - name: Checkout code
      uses: actions/checkout@v3

    # 2️⃣ Set up Docker Buildx (faster builds)
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    # 3️⃣ Build Docker image
    - name: Build Docker Image
      run: docker build -t churn-pytorch .

    # 4️⃣ Run container
    - name: Run container
      run: docker run -d -p 8000:8000 --name churn-container churn-pytorch

    # 5️⃣ Wait for app startup
    - name: Wait for API
      run: sleep 15

    # 6️⃣ Health check
    - name: Test API endpoint
      run: |
        curl -f http://localhost:8000/ || exit 1

    # 7️⃣ Stop container (cleanup)
    - name: Stop container
      run: docker stop churn-container

    # -------------------------------
    # OPTIONAL: Push to Docker Hub
    # -------------------------------

    - name: Login to Docker Hub
      if: success()
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build & Push Image
      if: success()
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/churn-pytorch:latest .
        docker push ${{ secrets.DOCKER_USERNAME }}/churn-pytorch:latest