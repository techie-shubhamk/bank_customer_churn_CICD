name: CI-CD Full Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Login Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/churn-pytorch .

    - name: Run Container
      run: docker run -d -p 8000:8000 --name churn-container ${{ secrets.DOCKER_USERNAME }}/churn-pytorch

    - name: Wait
      run: sleep 10

    - name: Test API
      run: curl -f http://localhost:8000/ || exit 1

    - name: Push Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/churn-pytorch

    - name: Cleanup
      if: always()
      run: docker stop churn-container || true